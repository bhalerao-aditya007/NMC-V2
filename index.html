                                        <div className="stat-item"><span className="stat-label">Capital Works</span><span className="stat-value">{results.documentsAnalyzed.capitalWorks}</span></div>
                                        <div className="stat-item"><span className="stat-label">Agreements</span><span className="stat-value">{results.documentsAnalyzed.agreements}</span></div>
                                        <div className="stat-item"><span className="stat-label">Critical</span><span className="stat-value" style={{color:'#d32f2f'}}>{results.flags.filter(f=>f.severity==='critical').length}</span></div>
                                        <div className="stat-item"><span className="stat-label">High</span><span className="stat-value" style={{color:'#e65100'}}>{results.flags.filter(f=>f.severity==='high').length}</span></div>
                                        <div className="stat-item"><span className="stat-label">Medium</span><span className="stat-value" style={{color:'#f57f17'}}>{results.flags.filter(f=>f.severity==='medium').length}</span></div>
                                    </div>
                                </div>

                                <div className="search-filter-section">
                                    <input type="text" className="search-bar" placeholder="Search red flags by work name, type, issue, evidence…" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                                    <div className="filters-grid">
                                        {[
                                            ['pwDivision','PW Division',['EE PWD LATUR','EE PWD NILANGA','EE PWD NO 2 LATUR','EE PWD OSMANABAD']],
                                            ['taluka','Taluka',['AHMADPUR','AUSA','CHAKUR','DEWNI','JALKOT','LATUR','NILANGA','RENAPUR','SHIRUR ANANTPAL','UDGIR']],
                                            ['roadCategory','Road Category',['MDR -1','MDR -2','SH -4','SH -25','SH -56','SH -68','SH -108','SH -123','VR -2','ODR -1','NH -63']],
                                            ['constituency','Constituency',['AHMADPUR','AUSA','LATUR CITY','LATUR RURAL','NILANGA','UDGIR']],
                                            ['workCategory','Work Category',['BASECOURSE PLUS SURFACING','CRUST REBUILT','MAJOR BRIDGE','MINOR BRIDGE','ONLY BITUMINOUS SURFACING','RIGID PAVEMENT','ROB','WIDENING SURFACING']],
                                            ['headOfAccounts','Head of Accounts',['30540078','30540167','40590799','50540106','50540349','50540752','50545242','50545289','50545331','50545369','50545402']],
                                            ['district','District',['LATUR']]
                                        ].map(([key,label,opts]) => (
                                            <select key={key} className="filter-select" value={filters[key]} onChange={(e) => setFilters({...filters,[key]:e.target.value})}>
                                                <option value="">{`All ${label}s`}</option>
                                                {opts.map(o => <option key={o} value={o}>{o}</option>)}
                                            </select>
                                        ))}
                                    </div>
                                </div>

                                {filteredFlags.length === 0 ? (
                                    <div className="no-flags">
                                        <div className="no-flags-icon">✓</div>
                                        <div>{results.flags.length === 0 ? 'No red flags detected in the analyzed documents' : 'No red flags match the current filters/search'}</div>
                                    </div>
                                ) : (
                                    <>
                                        {Object.entries(flagsByType).map(([type, flist]) => (
                                            <div key={type} className="flag-section">
                                                <div className="flag-header">{type} ({flist.length})</div>
                                                <div className="flag-content">
                                                    {flist.map((flag, idx) => (
                                                        <div key={idx} className={`flag-item severity-${flag.severity}`}>
                                                            <div className="flag-title">
                                                                {flag.work}
                                                                <span className={`severity-badge ${flag.severity}`}>{flag.severity}</span>
                                                            </div>
                                                            <div className="flag-detail"><strong>Details:</strong> {flag.details}</div>
                                                            <div className="flag-detail"><strong>Issue:</strong> {flag.remark}</div>
                                                            <div className="flag-detail"><strong>Evidence:</strong> {flag.evidence}</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ))}
                                        <button className="download-btn" onClick={() => generatePDF(results)}>Download PDF Report</button>
                                    </>
                                )}

                                <button className="analyze-btn" onClick={() => { setResults(null); setFiles({}); setSearchQuery(''); }} style={{marginTop:'10px'}}>
                                    Analyze New Documents
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
